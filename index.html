<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, address=no, email=no, date=no">
    <title>Quiz: Che Zibetto Sei? - Ziretto Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #F8F6F0;
            --ziretto-pink: #C8466C;
            --ziretto-lilac: #D3B9CE;
            --ziretto-green: #6FAF81;
            --ziretto-orange: #CE623E;
            --ziretto-blue: #9ECBD7;
            --black: #000000;
            --white: #ffffff;
        }

        body {
            background: linear-gradient(135deg, #c43b67 0%, #cc5a4a 45%, #6faf81 85%, #c43b67 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Montserrat', 'Futura', sans-serif;
            color: var(--black);
            -webkit-font-smoothing: antialiased;
        }

        #quiz-card {
            background: var(--bg-cream);
            max-width: 500px;
            width: 100%;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 3px solid var(--black);
            position: relative;
        }

        .progress-container {
            width: 100%;
            height: 14px;
            background: var(--white);
            border: 2px solid var(--black);
            margin-bottom: 35px;
            border-radius: 20px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: var(--ziretto-green);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 { 
            font-weight: 900;
            text-transform: uppercase;
            font-size: 2.4rem; 
            margin-top: 0;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 30px;
            min-height: 60px;
            line-height: 1.3;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            font-family: 'Montserrat', sans-serif;
            background: var(--white);
            border: 2px solid var(--black);
            padding: 16px 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 14px; 
            transition: background-color 0.2s, transform 0.1s;
            text-align: left;
            color: var(--black);
            -webkit-tap-highlight-color: transparent;
        }

        /* --- SOLUZIONE AL PROBLEMA DEL BLU --- */
        /* L'effetto hover (blu) viene applicato SOLO su computer con mouse */
        @media (hover: hover) {
            .option-btn:hover {
                background-color: var(--ziretto-blue);
                transform: translateY(-2px);
            }
        }

        /* Effetto al tocco (attivo) breve per mobile */
        .option-btn:active {
            background-color: var(--ziretto-blue);
            transform: scale(0.98);
        }

        /* Classe per le risposte date in precedenza (quando si clicca indietro) */
        .option-btn.selected {
            background-color: var(--ziretto-blue) !important;
            font-weight: bold;
            box-shadow: inset 0px 0px 0px 1px var(--black);
        }
        /* ------------------------------------ */

        .nav-container {
            display: flex;
            justify-content: flex-start;
            margin-top: 15px;
        }

        .back-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px;
        }

        .hidden { display: none; }

        #result-screen img {
            width: 240px;
            height: 240px;
            margin: 25px auto;
            border: 3px solid var(--black);
            display: block;
            object-fit: contain;
            background: var(--white);
            border-radius: 18px; 
        }

        .download-btn, .start-btn {
            font-family: 'Montserrat', sans-serif;
            border: 2px solid var(--black);
            padding: 16px 35px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px; 
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .start-btn { background: var(--ziretto-pink); color: white; }
        .download-btn { background: var(--ziretto-orange); color: white; margin-top: 20px;}
    </style>
</head>
<body>

<div id="quiz-card">
    <div id="start-screen">
        <div style="font-size: 3.5rem; margin-bottom: 15px;">🐾</div>
        <h1>Che Zibetto sei?</h1>
        <p>Scopri il tuo archetipo Ziretto e scarica lo sticker ufficiale!</p>
        <button class="start-btn" onclick="startQuiz()">Inizia il test</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="question-text" class="question-text"></div>
        <div id="options-container" class="options-grid"></div>
        
        <div class="nav-container">
            <button id="back-button" class="back-btn" onclick="previousQuestion()">
                ← Indietro
            </button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 id="winner-name"></h1>
        <img id="result-img" src="" alt="Risultato">
        <p id="winner-desc"></p>
        <button id="download-btn" class="download-btn">Scarica Sticker 🎁</button>
        <p style="font-size: 0.8rem; margin-top: 20px;">Gli sticker fisici sono disponibili al Carretto!</p>
    </div>
</div>

<script>
    const questions = [
        { q: "Come affronti le prime ore del mattino?", 
          options: [
            { t: "Colazione su vassoio d'argento.", p: "VIP" },
            { t: "Ammiro il mio fondoschiena in pigiama.", p: "LatoB" },
            { t: "Mi barrico in bagno. Momento sacro.", p: "RilascioLento" },
            { t: "Caffè, doccia lampo e fuori!", p: "Esplosivo" },
            { t: "Saggio di nicchia e miscela rara.", p: "StronzoAutore" },
            { t: "Mando a quel paese la sveglia.", p: "FacciaCaffe" }
          ]
        },
        { q: "Al ristorante, come scegli dal menù?", 
          options: [
            { t: "Il piatto più costoso.", p: "VIP" },
            { t: "Piatto proteico per il mio Lato B.", p: "LatoB" },
            { t: "Qualcosa di pesante, amo meditare.", p: "RilascioLento" },
            { t: "La prima cosa che capita.", p: "Esplosivo" },
            { t: "Provenienza esatta degli ingredienti.", p: "StronzoAutore" },
            { t: "Il menù fa pena, voglio altro.", p: "FacciaCaffe" }
          ]
        },
        { q: "Come reagisci ai problemi?", 
          options: [
            { t: "Pago qualcuno per sistemare.", p: "VIP" },
            { t: "Cerco l'angolazione per i fotografi.", p: "LatoB" },
            { t: "Mi prendo il mio tempo.", p: "RilascioLento" },
            { t: "Esplodo, faccio un disastro.", p: "Esplosivo" },
            { t: "Ne faccio un'opera d'arte.", p: "StronzoAutore" },
            { t: "Lancio il problema a qualcun altro.", p: "FacciaCaffe" }
          ]
        },
        { q: "Qual è la tua arma segreta di conquista?", 
          options: [
            { t: "Estratto conto e champagne.", p: "VIP" },
            { t: "Mi giro di spalle e lascio fare alla genetica.", p: "LatoB" },
            { t: "Li conquisto per sfinimento lento.", p: "RilascioLento" },
            { t: "Li travolgo di energia.", p: "Esplosivo" },
            { t: "Critico i loro gusti musicali.", p: "StronzoAutore" },
            { t: "Battuta così scorretta da denuncia.", p: "FacciaCaffe" }
          ]
        },
        { q: "Cosa non manca nel tuo guardaroba?", 
          options: [
            { t: "Solo grandi firme.", p: "VIP" },
            { t: "Jeans push-up strategici.", p: "LatoB" },
            { t: "Tuta extralarge comoda.", p: "RilascioLento" },
            { t: "Le prime cose pulite che trovo.", p: "Esplosivo" },
            { t: "Capi vintage introvabili.", p: "StronzoAutore" },
            { t: "T-shirt con scritte provocatorie.", p: "FacciaCaffe" }
          ]
        }
    ];

    const archetypes = {
        VIP: { desc: "Esigente e amante del lusso.", img: "TRATTAMENTO VIP.jpg" },
        LatoB: { desc: "Fiero della tua presenza scenica!", img: "TUTTO LATO B.jpg" },
        RilascioLento: { desc: "Ami i momenti sacri e la calma.", img: "A RILASCIO LENTO.jpg" },
        Esplosivo: { desc: "Una forza della natura! Vivi a mille.", img: "ESPLOSIVO.jpg" },
        StronzoAutore: { desc: "Gusti di nicchia troppo complessi per gli altri.", img: "STRONZO D'AUTORE.jpg" },
        FacciaCaffe: { desc: "Schietto e senza filtri. Tagliente.", img: "FACCIA DA CAFFÈ.jpg" }
    };

    let currentIdx = 0;
    let selectionsHistory = [];

    function startQuiz() {
        currentIdx = 0;
        selectionsHistory = [];
        document.getElementById('start-screen').className = 'hidden';
        document.getElementById('quiz-screen').className = '';
        showQuestion();
    }

    function showQuestion() {
        // Riporta il focus all'inizio della card (utile su mobile)
        window.scrollTo(0, 0);
        
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const previousSelection = selectionsHistory[currentIdx];

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.t;
            
            // Rimane selezionata solo se l'abbiamo già risposta (premendo "Indietro")
            if (previousSelection && previousSelection === opt.p) {
                btn.classList.add('selected');
            }

            btn.onclick = () => next(opt.p);
            container.appendChild(btn);
        });

        document.getElementById('back-button').style.visibility = (currentIdx === 0) ? 'hidden' : 'visible';
        document.getElementById('progress-bar').style.width = `${(currentIdx / questions.length) * 100}%`;
    }

    function next(profile) {
        // Registra o aggiorna la risposta
        selectionsHistory[currentIdx] = profile;

        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function previousQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').className = 'hidden';
        document.getElementById('result-screen').className = '';

        let finalScores = { VIP: 0, LatoB: 0, RilascioLento: 0, Esplosivo: 0, StronzoAutore: 0, FacciaCaffe: 0 };
        selectionsHistory.forEach(p => finalScores[p]++);
        let winner = Object.keys(finalScores).reduce((a, b) => finalScores[a] > finalScores[b] ? a : b);
        
        document.getElementById('winner-name').innerText = winner.replace(/([A-Z])/g, ' $1').trim();
        document.getElementById('winner-desc').innerText = archetypes[winner].desc;
        document.getElementById('result-img').src = archetypes[winner].img;
        
        document.getElementById('download-btn').onclick = () => alert("Download dello sticker: " + winner);
    }
</script>

</body>
</html>
