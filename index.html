<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no, address=no, email=no, date=no">
    <title>Quiz: Che Zibetto Sei? - Ziretto Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #F8F6F0;
            --ziretto-pink: #C8466C;
            --ziretto-lilac: #D3B9CE;
            --ziretto-green: #6FAF81;
            --ziretto-orange: #CE623E;
            --ziretto-blue: #9ECBD7;
            --black: #000000;
            --white: #ffffff;
        }

        body {
            background: linear-gradient(135deg, #c43b67 0%, #cc5a4a 45%, #6faf81 85%, #c43b67 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Montserrat', 'Futura', sans-serif;
            color: var(--black);
            -webkit-font-smoothing: antialiased;
        }

        /* Forza la neutralizzazione di qualsiasi link auto-generato dai browser mobile */
        a, a:hover, a:active, a:focus, span, p, h1 {
            color: inherit;
            text-decoration: none !important;
        }

        #quiz-card {
            background: var(--bg-cream);
            max-width: 500px;
            width: 100%;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 3px solid var(--black);
            position: relative;
            overflow: hidden;
        }

        .progress-container {
            width: 100%;
            height: 14px;
            background: var(--white);
            border: 2px solid var(--black);
            margin-bottom: 35px;
            border-radius: 20px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: var(--ziretto-green);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 { 
            font-weight: 900;
            text-transform: uppercase;
            color: var(--black); 
            font-size: 2.4rem; 
            margin-top: 0;
            margin-bottom: 15px;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        p.subtitle { 
            font-size: 1.05rem;
            color: var(--black); 
            margin-bottom: 30px; 
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: bold;
            color: var(--black);
            margin-bottom: 30px;
            min-height: 60px;
            line-height: 1.3;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            font-family: 'Montserrat', 'Futura', sans-serif;
            background: var(--white);
            border: 2px solid var(--black);
            padding: 16px 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.3;
            border-radius: 14px; 
            transition: all 0.2s ease;
            text-align: left;
            color: var(--black) !important;
        }

        .option-btn:hover {
            background-color: var(--ziretto-blue);
            transform: translateY(-2px);
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .option-btn.selected {
            background-color: var(--ziretto-blue);
            border-color: var(--black);
            box-shadow: inset 0px 0px 0px 1px var(--black);
            font-weight: bold;
        }

        .nav-container {
            display: flex;
            justify-content: flex-start;
            margin-top: 15px;
        }

        .back-btn {
            font-family: 'Montserrat', 'Futura', sans-serif;
            background: transparent;
            border: none;
            color: var(--black);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .hidden { display: none; }

        #result-screen img {
            width: 240px;
            height: 240px;
            margin: 25px auto;
            border: 3px solid var(--black);
            display: block;
            object-fit: contain;
            background: var(--white);
            border-radius: 18px; 
        }

        .download-btn {
            font-family: 'Montserrat', 'Futura', sans-serif;
            display: inline-block;
            background: var(--ziretto-orange);
            color: var(--white) !important;
            padding: 18px 35px;
            text-decoration: none !important;
            font-weight: bold;
            margin-top: 25px;
            border: 2px solid var(--black);
            border-radius: 30px; 
            box-shadow: 0px 5px 15px rgba(206, 101, 65, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .download-btn:hover {
            background: var(--ziretto-pink);
            transform: translateY(-2px);
        }

        .start-btn {
            font-family: 'Montserrat', 'Futura', sans-serif;
            background: var(--ziretto-pink);
            color: var(--white);
            border: 2px solid var(--black);
            padding: 16px 45px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px; 
            box-shadow: 0px 5px 15px rgba(206, 79, 110, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="quiz-card">
    <div id="start-screen">
        <div style="font-size: 3.5rem; margin-bottom: 15px;">🐾</div>
        <h1>Che Zibetto sei?</h1>
        <p class="subtitle">Scopri il tuo archetipo Ziretto e scarica lo sticker ufficiale!</p>
        <button class="start-btn" onclick="startQuiz()">Inizia il test</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="question-text" class="question-text"></div>
        <div id="options-container" class="options-grid"></div>
        
        <div class="nav-container">
            <button id="back-button" class="back-btn" onclick="previousQuestion()">
                ← Indietro
            </button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <p style="text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px; font-size: 0.9rem; margin-bottom: 5px;">Risultato:</p>
        <h1 id="winner-name"></h1>
        <div id="winner-image">
            <img id="result-img" src="" alt="Il tuo Zibetto">
        </div>
        <p id="winner-desc" style="line-height: 1.6; font-weight: 500; font-size: 1.05rem; padding: 0 10px;"></p>
        <button id="download-btn" class="download-btn">Scarica Sticker 🎁</button>
        <p style="font-size: 0.85rem; margin-top: 30px; color: var(--black); font-weight: bold; letter-spacing: 0.3px; margin-bottom: 4px;">Puoi acquistare gli sticker fisici presso il Carretto</p>
        <p style="font-size: 0.85rem; color: var(--black); font-weight: 500; letter-spacing: 0.3px; margin-top: 0; font-style: italic;">lo sticker che a seguito delle domande ti ha rappresentato di più è gratis</p>
    </div>
</div>

<script>
    const questions = [
        { q: "Come affronti le prime ore del mattino (e il risveglio fisiologico)?", 
          options: [
            { t: "Non mi alzo se non ho la colazione su un vassoio d'argento.", p: "VIP" },
            { t: "Ammiro allo specchio quanto il mio fondoschiena stia bene in pigiama.", p: "LatoB" },
            { t: "Mi barrico in bagno col telephone. È un momento sacro.", p: "RilascioLento" },
            { t: "Caffè, doccia lampo, ansia e sono già fuori a fare danni!", p: "Esplosivo" },
            { t: "Leggo un saggio di nicchia mentre degusto una miscela rarissima.", p: "StronzoAutore" },
            { t: "Mando a quel paese la sveglia e l'universo intero.", p: "FacciaCaffe" }
          ]
        },
        { q: "Al ristorante, qual è il tuo criterio principale per scegliere dal menù?", 
          options: [
            { t: "Scelgo il piatto più costoso. Se non è un lusso, non lo voglio.", p: "VIP" },
            { t: "Piatto proteico: devo mantenere tonico il mio 'lato migliore'.", p: "LatoB" },
            { t: "Qualcosa di pesante. Amo le lunghe digestioni meditative.", p: "RilascioLento" },
            { t: "Ingurgito la prima cosa che capita e passo alla prossima attività.", p: "Esplosivo" },
            { t: "Chiedo allo chef l'esatta provenienza geografica degli ingredienti.", p: "StronzoAutore" },
            { t: "Dico apertamente che il menù fa pena e pretendo un fuori carta.", p: "FacciaCaffe" }
          ]
        },
        { q: "Quando la vita ti lancia addosso dei problemi, come reagisci?", 
          options: [
            { t: "Pago qualcuno per sistemare al posto mio, non mi sporco le mani.", p: "VIP" },
            { t: "Faccio in modo di uscirne con l'angolazione perfetta per i fotografi.", p: "LatoB" },
            { t: "Mi prendo tutto il tempo. Le grandi liberazioni richiedono pazienza.", p: "RilascioLento" },
            { t: "Esplodo. In tutti i sensi. Faccio un disastro ma mi passa in fretta.", p: "Esplosivo" },
            { t: "Trasformo il mio disagio in un'opera d'arte concettuale.", p: "StronzoAutore" },
            { t: "Lancio il problema addosso a qualcun altro senza alcun filtro.", p: "FacciaCaffe" }
          ]
        },
        { q: "Qual è la tua arma segreta per conquistarare qualcuno?", 
          options: [
            { t: "Sfoggio il mio estratto conto e champagne di marca.", p: "VIP" },
            { t: "Mi giro di spalle e lascio che la genetica faccia il lavoro sporco.", p: "LatoB" },
            { t: "Nessuna fretta. Li conquisto per sfinimento a lento rilasio.", p: "RilascioLento" },
            { t: "Parlo a raffica e li travolgo di energia finché non cedono.", p: "Esplosivo" },
            { t: "Spiego loro perché i loro gusti musicali sono banali.", p: "StronzoAutore" },
            { t: "Faccio una battuta così scorretta che o mi sposano o mi denunciano.", p: "FacciaCaffe" }
          ]
        },
        { q: "Alla fine di un lungo progetto, come valuti quello che hai 'sfornato'?", 
          options: [
            { t: "Deve valere a peso d'oro, altrimenti non lo produco.", p: "VIP" },
            { t: "Bello, ma l'importante è che il processo mi ha tonificato i glutei.", p: "LatoB" },
            { t: "Ci è voluto un secolo, ma liberarsene è stata una soddisfazione.", p: "RilascioLento" },
            { t: "Fatto alla velocità della luce: è un po' sparso in giro, ma c'è!", p: "Esplosivo" },
            { t: "È un capolavoro, peccato che la massa non possa capirlo.", p: "StronzoAutore" },
            { t: "A me piace. Chi non è d'accordo può voltarsi dall'altra parte.", p: "FacciaCaffe" }
          ]
        },
        { q: "Come ti comporti quando ti invitano a una festa?", 
          options: [
            { t: "Privé con bottiglia costosa, guardando i plebei da lontano.", p: "VIP" },
            { t: "Pantaloni così attillati da ipnotizzare chiunque mi segua.", p: "LatoB" },
            { t: "Trovo il divano più comodo e metto le radici.", p: "RilascioLento" },
            { t: "Rimbalzo tra i gruppi rovesciando drink e creando caos.", p: "Esplosivo" },
            { t: "Critico aspramente la playlist del DJ e la qualità del buffet.", p: "StronzoAutore" },
            { t: "Faccio una battuta sconcia durante un momento di silenzio.", p: "FacciaCaffe" }
          ]
        },
        { q: "Si avvicina una scadenza importante, come gestisci il carico?", 
          options: [
            { t: "Pago qualcun altro per fare il lavoro sporco.", p: "VIP" },
            { t: "Curo maniacalmente l'estetica della copertina.", p: "LatoB" },
            { t: "Procrastino: ho bisogno che le idee fermentino lentamente.", p: "RilascioLento" },
            { t: "Maratona notturna a caffeina: produco roba disordinata ma tanta.", p: "Esplosivo" },
            { t: "Mi rifiuto di abbassare i miei standard per i tempi commerciali.", p: "StronzoAutore" },
            { t: "Consegno dicendo che le direttive iniziali facevano pena.", p: "FacciaCaffe" }
          ]
        },
        { q: "Hai bisogno di staccare la spina. Meta perfetta?", 
          options: [
            { t: "Resort 5 stelle con spa esclusiva e servizio h24.", p: "VIP" },
            { t: "Spiaggia affollata e lunghe sfilate strategiche sul bagnasciuga.", p: "LatoB" },
            { t: "Baita isolata: transitare solo tra letto, poltrona e bagno.", p: "RilascioLento" },
            { t: "On the road: 15 città in 3 giorni con 3 ore di sonno.", p: "Esplosivo" },
            { t: "Festival d'arte underground in una città che nessuno conosce.", p: "StronzoAutore" },
            { t: "Mi imbbuco alle feste degli hotel di lusso finché non mi cacciano.", p: "FacciaCaffe" }
          ]
        },
        { q: "Cosa non può mai mancare nel tuo guardaroba?", 
          options: [
            { t: "Solo grandi firme che urlano ricchezza.", p: "VIP" },
            { t: "Jeans push-up per valorizzare il mio posteriore.", p: "LatoB" },
            { t: "Tuta extralarge: niente deve stringere in vita.", p: "RilascioLento" },
            { t: "Le prime cose pulite che trovo. Non ho tempo da perdere.", p: "Esplosivo" },
            { t: "Capi vintage e sartoriali difficilissimi da abbinare.", p: "StronzoAutore" },
            { t: "T-shirt con scritte provocatorie che scioccano le vecchiette.", p: "FacciaCaffe" }
          ]
        },
        { q: "Qual è il tuo vero rapporto con il caffè?", 
          options: [
            { t: "Servito in tazza di design in un bar esclusivo.", p: "VIP" },
            { t: "Macchiato freddo scremato: la linea viene prima di tutto.", p: "LatoB" },
            { t: "In rigoroso silenzio per 40 minuti. Guai a chi mi interrompe.", p: "RilascioLento" },
            { t: "Triplo espresso in un sorso stando in piedi al bancone.", p: "Esplosivo" },
            { t: "Solo monorigine espresso a 92 gradi esatti.", p: "StronzoAutore" },
            { t: "Nero, amaro e bollente. Come le mie risposte.", p: "FacciaCaffe" }
          ]
        }
    ];

    // Corretti i puntamenti stringendo la tolleranza sugli spazi ed eliminando caratteri speciali ambigui
    const archetypes = {
        VIP: { desc: "Esigente e amante del lusso. Cerchi la qualità assoluta e pretendi il meglio (servito su un piatto d'argento).", img: "TRATTAMENTO VIP.jpg" },
        LatoB: { desc: "Fiero della tua presenza scenica! Sai esattamente come valorizzarti e lasciare che sia il tuo lato migliore a parlare.", img: "TUTTO LATO B.jpg" },
        RilascioLento: { desc: "Ami i momenti sacri e le lunghe riflessioni fatte con i tuoi ritmi. La calma è la tua virtù.", img: "A RILASCIO LENTO.jpg" },
        Esplosivo: { desc: "Una forza della natura! Vivi a mille all'ora, travolgi chiunque e non hai tempo da perdere.", img: "ESPLOSIVO.jpg" },
        StronzoAutore: { desc: "I tuoi gusti sono talmente di nicchia e complessi che la massa non potrà mai arrivarci.", img: "STRONZO D'AUTORE.jpg" },
        FacciaCaffe: { desc: "Schietto e senza filtri. Dai risposte taglienti e ami la verità nuda e cruda.", img: "FACCIA DA CAFFÈ.jpg" }
    };

    let currentIdx = 0;
    let selectionsHistory = [];

    function startQuiz() {
        currentIdx = 0;
        selectionsHistory = [];
        document.getElementById('start-screen').className = 'hidden';
        document.getElementById('quiz-screen').className = '';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const previousSelection = selectionsHistory[currentIdx];

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.t;
            
            if (previousSelection && previousSelection === opt.p) {
                btn.classList.add('selected');
            }

            btn.onclick = () => next(opt.p);
            container.appendChild(btn);
        });

        const backBtn = document.getElementById('back-button');
        backBtn.style.visibility = (currentIdx === 0) ? 'hidden' : 'visible';
        document.getElementById('progress-bar').style.width = `${(currentIdx / questions.length) * 100}%`;
    }

    function next(profile) {
        if (selectionsHistory[currentIdx]) {
            selectionsHistory[currentIdx] = profile;
        } else {
            selectionsHistory.push(profile);
        }

        currentIdx++;
        if (currentIdx < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function previousQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').className = 'hidden';
        document.getElementById('result-screen').className = '';

        let finalScores = { VIP: 0, LatoB: 0, RilascioLento: 0, Esplosivo: 0, StronzoAutore: 0, FacciaCaffe: 0 };
        selectionsHistory.forEach(p => finalScores[p]++);

        let winner = Object.keys(finalScores).reduce((a, b) => finalScores[a] > finalScores[b] ? a : b);
        let data = archetypes[winner];
        
        let displayName = "";
        if(winner === "VIP") displayName = "TRATTAMENTO V.I.P.";
        if(winner === "LatoB") displayName = "TUTTO LATO B";
        if(winner === "RilascioLento") displayName = "A RILASCIO LENTO";
        if(winner === "Esplosivo") displayName = "ESPLOSIVO";
        if(winner === "StronzoAutore") displayName = "STRONZO D'AUTORE";
        if(winner === "FacciaCaffe") displayName = "FACCIA DA C...AFFÈ";

        document.getElementById('winner-name').innerText = displayName;
        document.getElementById('winner-desc').innerText = data.desc;
        
        const imgElement = document.getElementById('result-img');
        
        // Codifica automatica di sicurezza per gli spazi e le lettere accentate nei nomi file su GitHub
        imgElement.src = encodeURIComponent(data.img).replace(/%2F/g, '/');

        const downloadBtn = document.getElementById('download-btn');
        downloadBtn.onclick = function() {
            fetch(imgElement.src)
                .then(response => response.blob())
                .then(blob => {
                    const blobUrl = window.URL.createObjectURL(blob);
                    const tempLink = document.createElement('a');
                    tempLink.href = blobUrl;
                    tempLink.download = "Ziretto_Sticker_" + winner + ".jpg";
                    document.body.appendChild(tempLink);
                    tempLink.click();
                    document.body.removeChild(tempLink);
                    window.URL.revokeObjectURL(blobUrl);
                })
                .catch(() => {
                    window.open(imgElement.src, '_blank');
                });
        };

        imgElement.onerror = function() {
            // Se fallisce la codifica accentata, prova il nome file grezzo nativo come fallback prima del placeholder
            if (this.src !== data.img) {
                this.src = data.img;
            } else {
                this.src = "https://via.placeholder.com/180/F4F1E8/1A1A1A?text=STICKER+" + winner;
            }
        };
    }
</script>

</body>
</html>
